<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>构建详情 - 构建工具</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>📋 构建详情</h1>
      <a href="/" class="btn">← 返回</a>
      <button class="btn btn-small" onclick="logout()">退出</button>
    </header>

    <section class="card" id="taskInfo">
      <p>加载中...</p>
    </section>

    <section class="card" id="commitSection" style="display:none">
      <h2>最近提交</h2>
      <div id="commitList"></div>
    </section>

    <section class="card" id="logSection" style="display:none">
      <h2>构建日志</h2>
      <pre id="logContent" class="log-output"></pre>
    </section>
  </div>

  <script src="/js/detail.js"></script>
</body>
</html>
